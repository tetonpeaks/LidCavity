<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}"/>
    <!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="https://mincss.com/entireframework.min.css" crossorigin="anonymous"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <title>CFD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.1/chart.min.js"></script>
  </head>
  <body class="body">
    <div class="upper">

      <div class="hero0" id="hero0">
        <div class="progress" id="progress">
          <canvas id="myChart0"></canvas>
        </div>

        <div class="form">
              <form action="">
                <p>
                  <label for="input-T" class="input"> Temp. </label>
                  <input type="text" class="input" id="input-T" value="60" placeholder="60&#8451">
                  <input type="hidden" name="csrf_token" value = "{{ csrf_token() }}" />
                </p>
                <p>
                  <label for="input-U" class="input"> U </label>
                  <input type="text" class="input" id="input-U" value="10" placeholder="10">
                  <input type="hidden" name="csrf_token" value = "{{ csrf_token() }}" />
                </p>
                <p>
                  <label for="input-Re" class="input"> Reynolds' Number: </label>
                  <input type="text" class="input" id="input-Re" value="400" placeholder="400">
                  <input type="hidden" name="csrf_token" value = "{{ csrf_token() }}" />
                </p>
                <p>
                  <label for="input-N" class="input"> Control Volumes: </label>
                  <input type="text" class="input" id="input-N" value="20" placeholder="10">

                  <input type="hidden" name="csrf_token" value = "{{ csrf_token() }}" />
                </p>
                <!-- <input type="hidden" name="csrf_token" value = "{{ csrf_token() }}" /> -->
              </form>

              <button class="btn btn-sm btn-outline-primary" id="run">Run</button>
              <button class="btn btn-sm btn-outline-primary" id="uv">Integrate Velocity Field</button>
              <button class="btn btn-sm btn-outline-primary" id="streamline">Animate Streamlines</button>
              <button class="btn btn-sm btn-outline-primary" id="reset1">Reset Chart 1</button>

            </div>
          </div>
        </div>

        <!-- <div class="" id=""> -->
          <div class="hero1">
              <canvas class="myChart1" id="myChart1" style="width:75%;height:75%"></canvas>
          </div>
        <div class="bottom">
          <div class="hero2">
            <canvas class="myChart2" id="myChart2" style="width:75%;height:250px"></canvas>
            <!-- <canvas class="myChart2" id="myChart2" style="width:75%;height:46.875%"></canvas> -->
          </div>
        </div>
        <!-- </div> -->

    <script type="text/javascript" src="{{ url_for('static', filename='index.js') }}"></script>
  </body>
</html>
